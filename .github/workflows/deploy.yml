name: AI Property Price Predictor CI

on:
  workflow_dispatch:

jobs:

################################################################################
# Frontend Build
################################################################################

  frontend-build:

    name: Frontend Build

    runs-on: ubuntu-latest

    timeout-minutes: 10

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        working-directory: frontend
        run: |
          npm ci

      - name: Build React Application
        working-directory: frontend
        run: |
          npm run build

      - name: Run ESLint
        working-directory: frontend
        run: |
          npm run lint

      - name: Security Scan (npm audit)
        working-directory: frontend
        continue-on-error: true
        run: |
          npm audit --audit-level=high

################################################################################
# Backend Build
################################################################################

  backend-build:

    name: Backend Build

    runs-on: ubuntu-latest

    needs: frontend-build

    timeout-minutes: 15

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pip-audit

      - name: Security Scan (pip-audit)
        working-directory: backend
        continue-on-error: true
        run: |
          pip-audit

      - name: Start FastAPI Server
        working-directory: backend
        run: |
          uvicorn app.main:app --host 127.0.0.1 --port 8000 &
          sleep 10

      - name: Test Health Endpoint
        run: |
          curl --fail http://127.0.0.1:8000/health

      - name: Test Model Info Endpoint
        run: |
          curl --fail http://127.0.0.1:8000/model-info

      - name: Test Prediction API
        run: |
          curl --fail \
            -X POST http://127.0.0.1:8000/predict \
            -H "Content-Type: application/json" \
            -d '{
              "corridor":"dehu_solapur",
              "bhk":2,
              "carpet_area":1000,
              "bathrooms":2,
              "floor":5,
              "amenities":["gym","parking"]
            }'


################################################################################
# Docker Build
################################################################################

  docker-build:

    name: Docker Build

    runs-on: ubuntu-latest

    needs:
      - frontend-build
      - backend-build

    timeout-minutes: 20

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      ####################################################
      # Build Images
      ####################################################

      - name: Build Docker Images
        run: |
          docker compose build

      ####################################################
      # Start Containers
      ####################################################

      - name: Start Docker Containers
        run: |
          docker compose up -d

      - name: Verify Running Containers
        run: |
          docker compose ps

      - name: Wait for Containers
        run: |
          sleep 20

      ####################################################
      # Test Application
      ####################################################

      - name: Test Health Endpoint
        run: |
          curl --fail http://localhost:8000/health

      - name: Test Model Info Endpoint
        run: |
          curl --fail http://localhost:8000/model-info

      - name: Test Prediction API
        run: |
          curl --fail \
            -X POST http://localhost:8000/predict \
            -H "Content-Type: application/json" \
            -d '{
              "corridor":"dehu_solapur",
              "bhk":2,
              "carpet_area":1000,
              "bathrooms":2,
              "floor":5,
              "amenities":["gym","parking"]
            }'

      ####################################################
      # Install Trivy
      ####################################################

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg lsb-release apt-transport-https

          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | \
          gpg --dearmor | \
          sudo tee /usr/share/keyrings/trivy.gpg > /dev/null

          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | \
          sudo tee /etc/apt/sources.list.d/trivy.list

          sudo apt-get update
          sudo apt-get install -y trivy

      ####################################################
      # Docker Security Scan
      ####################################################

      - name: Scan Backend Image
        continue-on-error: true
        run: |
          trivy image ai-backend

      - name: Scan Frontend Image
        continue-on-error: true
        run: |
          trivy image ai-frontend

      ####################################################
      # Cleanup
      ####################################################

      - name: Stop Docker Containers
        if: always()
        run: |
          docker compose down


################################################################################
# Deploy to Render
################################################################################

  deploy-render:

    name: Deploy to Render

    runs-on: ubuntu-latest

    needs: docker-build

    timeout-minutes: 20

    steps:

      ####################################################
      # Trigger Backend Deployment
      ####################################################

      - name: Deploy Backend
        run: |
          curl -X POST "${{ secrets.RENDER_BACKEND_DEPLOY_HOOK }}"

      ####################################################
      # Wait for Backend Deployment
      ####################################################

      - name: Wait for Backend
        run: |
          sleep 90

      ####################################################
      # Trigger Frontend Deployment
      ####################################################

      - name: Deploy Frontend
        run: |
          curl -X POST "${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK }}"

      ####################################################
      # Wait for Frontend Deployment
      ####################################################

      - name: Wait for Frontend
        run: |
          sleep 90 

################################################################################
# Smoke Test
################################################################################

  smoke-test:

    name: Smoke Test

    runs-on: ubuntu-latest

    needs: deploy-render

    timeout-minutes: 10

    steps:

      ####################################################
      # Backend Health
      ####################################################

      - name: Check Backend Health
        run: |
          curl --fail https://ai-property-price-calculator-2.onrender.com/health

      ####################################################
      # Backend Model Info
      ####################################################

      - name: Check Model Info
        run: |
          curl --fail https://ai-property-price-calculator-2.onrender.com/model-info

      ####################################################
      # Prediction API
      ####################################################

      - name: Test Prediction API
        run: |
          curl --fail \
            -X POST https://ai-property-price-calculator-2.onrender.com/predict \
            -H "Content-Type: application/json" \
            -d '{
              "corridor":"dehu_solapur",
              "bhk":2,
              "carpet_area":1000,
              "bathrooms":2,
              "floor":5,
              "amenities":["gym","parking"]
            }'

      ####################################################
      # Frontend Test
      ####################################################

      - name: Check Frontend
        run: |
          curl --fail https://ai-property-price-calculator-1.onrender.com                           