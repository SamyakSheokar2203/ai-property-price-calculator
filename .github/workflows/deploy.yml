name: AI Property Price Predictor CI

on:
  workflow_dispatch:

jobs:

  application-validation:

    name: Application Validation

    runs-on: ubuntu-latest

    timeout-minutes: 20

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      ####################################################
      # Frontend
      ####################################################

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: |
          npm ci

      - name: Build Frontend
        working-directory: frontend
        run: |
          npm run build

      - name: Lint Frontend
        working-directory: frontend
        run: |
          npm run lint

      - name: Frontend Security Scan
        working-directory: frontend
        run: |
          npm audit --audit-level=high

      ####################################################
      # Backend
      ####################################################

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Backend Dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install black pip-audit

      - name: Check Python Formatting
        working-directory: backend
        run: |
          black --check .

      - name: Python Dependency Security Scan
        working-directory: backend
        run: |
          pip-audit

      - name: Start FastAPI Server
        working-directory: backend
        run: |
          uvicorn app.main:app --host 127.0.0.1 --port 8000 &
          sleep 10

      - name: Test Health Endpoint
        run: |
          curl --fail http://127.0.0.1:8000/health

      - name: Test Model Info Endpoint
        run: |
          curl --fail http://127.0.0.1:8000/model-info

      - name: Test Prediction API
        run: |
          curl --fail \
            -X POST http://127.0.0.1:8000/predict \
            -H "Content-Type: application/json" \
            -d '{
                  "corridor":"dehu_solapur",
                  "bhk":2,
                  "carpet_area":1000,
                  "bathrooms":2,
                  "floor":5,
                  "amenities":["gym","parking"]
                }'

  docker-validation:

    name: Docker Validation

    runs-on: ubuntu-latest

    needs: application-validation

    timeout-minutes: 20

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      ####################################################
      # Build Docker Images
      ####################################################

      - name: Build Docker Images
        run: |
          docker compose build

      ####################################################
      # Start Application
      ####################################################

      - name: Start Containers
        run: |
          docker compose up -d

      - name: Wait for Application
        run: |
          sleep 20

      ####################################################
      # Validate Backend APIs
      ####################################################

      - name: Test Health Endpoint
        run: |
          curl --fail http://localhost:8000/health

      - name: Test Model Info Endpoint
        run: |
          curl --fail http://localhost:8000/model-info

      - name: Test Prediction API
        run: |
          curl --fail \
            -X POST http://localhost:8000/predict \
            -H "Content-Type: application/json" \
            -d '{
                  "corridor":"dehu_solapur",
                  "bhk":2,
                  "carpet_area":1000,
                  "bathrooms":2,
                  "floor":5,
                  "amenities":["gym","parking"]
                }'

      ####################################################
      # Docker Image Security Scan
      ####################################################

      - name: Scan Backend Image
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ai-backend
          format: table
          exit-code: "0"

      - name: Scan Frontend Image
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ai-frontend
          format: table
          exit-code: "0"

      ####################################################
      # Cleanup
      ####################################################

      - name: Stop Containers
        if: always()
        run: |
          docker compose down                